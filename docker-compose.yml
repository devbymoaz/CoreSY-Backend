# CoreSY - Docker Compose orchestration
# Runs Node.js API, PostgreSQL, and Redis with hot reload in development

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    container_name: coresy-api
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - ../src:/app/src
      - ../prisma:/app/prisma
      - ../tests:/app/tests
      - /app/node_modules
    env_file:
      - ../.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://coresy:coresy_password@postgres:5432/coresy_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - coresy-network

  postgres:
    image: postgres:16-alpine
    container_name: coresy-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: coresy
      POSTGRES_PASSWORD: coresy_password
      POSTGRES_DB: coresy_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U coresy -d coresy_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coresy-network

  redis:
    image: redis:7-alpine
    container_name: coresy-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coresy-network

volumes:
  postgres_data:
  redis_data:

networks:
  coresy-network:
    driver: bridge
